<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VastMyWealth Inbox</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Force full screen */
html {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}

:root {
  --bg:     #080c14;
  --s1:     #0f1520;
  --s2:     #161d2e;
  --s3:     #1c2540;
  --b1:     #1e2d4a;
  --b2:     #243356;
  --accent: #2563eb;
  --a2:     #3b82f6;
  --a3:     #60a5fa;
  --green:  #10b981;
  --g2:     #34d399;
  --amber:  #f59e0b;
  --am2:    #fbbf24;
  --red:    #ef4444;
  --r2:     #f87171;
  --purple: #8b5cf6;
  --text:   #e2e8f0;
  --t2:     #94a3b8;
  --t3:     #475569;
  --mono:   'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

/* ─── LOGIN ─── */
#loginScreen {
  position: fixed; top:0; left:0; right:0; bottom:0;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; background: var(--bg); z-index: 100;
}

.login-card {
  width: 100%; max-width: 360px;
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 20px;
  padding: 28px 24px;
}

.login-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 16px;
  box-shadow: 0 0 32px rgba(37,99,235,0.35);
}

.login-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.login-sub   { font-size: 13px; color: var(--t2); text-align: center; margin-bottom: 24px; }

.flabel {
  font-size: 11px; font-weight: 700; color: var(--t3);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}

.finput {
  width: 100%;
  background: var(--s2); border: 1.5px solid var(--b2);
  border-radius: 10px; padding: 12px 14px;
  color: var(--text); font-size: 14px;
  font-family: 'Outfit', sans-serif;
  outline: none; transition: border-color 0.15s; margin-bottom: 14px;
}

.finput:focus { border-color: var(--a2); }

.login-btn {
  width: 100%;
  background: var(--accent); border: none;
  border-radius: 12px; padding: 13px;
  color: white; font-size: 15px; font-weight: 700;
  font-family: 'Outfit', sans-serif; cursor: pointer;
  transition: background 0.15s; margin-top: 4px;
}

.login-btn:active { background: var(--a2); }
.login-err { color: var(--r2); font-size: 12px; margin-top: 8px; text-align: center; display: none; }

/* ─── MAIN APP ─── */
#mainApp {
  display: none;
  flex-direction: column;
  height: 100%;
  width: 100%;
  overflow: hidden;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
}

/* ─── TOP NAV ─── */
.topnav {
  height: 52px;
  background: var(--s1); border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; padding: 0 14px; gap: 10px;
  flex-shrink: 0;
}

.nav-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 9px; display: flex; align-items: center;
  justify-content: center; font-size: 16px; flex-shrink: 0;
}

.nav-title { font-size: 15px; font-weight: 700; flex: 1; }
.nav-sub   { font-size: 10px; color: var(--t3); }

.back-btn {
  width: 34px; height: 34px;
  background: var(--s2); border: 1px solid var(--b2);
  border-radius: 9px; display: flex; align-items: center;
  justify-content: center; font-size: 16px; cursor: pointer; flex-shrink: 0;
}

.sync-btn {
  background: var(--s2); border: 1px solid var(--b2);
  border-radius: 8px; padding: 5px 10px;
  font-size: 11px; font-weight: 600; color: var(--t2);
  cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all 0.15s;
}

.sync-btn:active { background: var(--s3); }

/* ─── STATS ─── */
.stats-row {
  display: flex; gap: 8px; padding: 10px 14px;
  overflow-x: auto; flex-shrink: 0;
  background: var(--s1); border-bottom: 1px solid var(--b1);
}
.stats-row::-webkit-scrollbar { display: none; }

.stat {
  flex-shrink: 0;
  background: var(--s2); border: 1px solid var(--b1);
  border-radius: 10px; padding: 8px 14px;
  cursor: pointer; text-align: center; min-width: 66px;
}

.stat-num { font-size: 20px; font-weight: 800; font-family: var(--mono); line-height: 1; }
.stat-lbl { font-size: 9px; color: var(--t3); font-weight: 600; text-transform: uppercase; margin-top: 3px; }

/* ─── SEARCH ─── */
.search-wrap {
  padding: 10px 14px 6px;
  background: var(--s1); flex-shrink: 0;
}

.search-box {
  display: flex; align-items: center;
  background: var(--s2); border: 1.5px solid var(--b2);
  border-radius: 10px; padding: 0 12px; margin-bottom: 8px;
}
.search-box:focus-within { border-color: var(--a2); }
.search-box span { font-size: 14px; color: var(--t3); margin-right: 8px; }
.search-box input {
  flex: 1; background: none; border: none;
  color: var(--text); font-size: 13px;
  font-family: 'Outfit', sans-serif; padding: 10px 0; outline: none;
}

.chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
.chips::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  background: var(--s2); border: 1px solid var(--b1);
  color: var(--t2); font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px; cursor: pointer;
  white-space: nowrap;
}
.chip.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ─── LEADS LIST ─── */
.leads-list {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.leads-list::-webkit-scrollbar { display: none; }

.lead-card {
  padding: 12px 14px;
  border-bottom: 1px solid var(--b1);
  display: flex; gap: 12px; cursor: pointer;
}
.lead-card:active { background: var(--s2); }

.lc-ava {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 16px; flex-shrink: 0;
}

.lc-body { flex: 1; min-width: 0; }
.lc-row1 { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
.lc-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.lc-time { font-size: 10px; color: var(--t3); font-family: var(--mono); flex-shrink: 0; }
.lc-mob  { font-size: 12px; color: var(--t2); font-family: var(--mono); margin-bottom: 5px; }
.lc-tags { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

.tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 5px; text-transform: uppercase; }
.tag-pl  { background: rgba(37,99,235,0.15);  color: #60a5fa; }
.tag-bl  { background: rgba(245,158,11,0.15); color: #fbbf24; }
.tag-hl  { background: rgba(16,185,129,0.15); color: #34d399; }
.tag-lap { background: rgba(139,92,246,0.15); color: #a78bfa; }

.pill { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 5px; }
.pill-pending   { background: rgba(245,158,11,0.12);  color: #fbbf24; }
.pill-allocated { background: rgba(16,185,129,0.12);  color: #34d399; }
.pill-dead      { background: rgba(100,116,139,0.12); color: #94a3b8; }
.pill-dup       { background: rgba(239,68,68,0.12);   color: #f87171; }

/* ─── DETAIL SCREEN ─── */
#detailScreen {
  display: none; flex-direction: column;
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: var(--bg); z-index: 50;
}

/* ─── HERO ─── */
.hero {
  background: var(--s1); border-bottom: 1px solid var(--b1);
  padding: 14px; flex-shrink: 0;
}

.hero-row1 { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

.hero-ava {
  width: 46px; height: 46px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 20px; flex-shrink: 0;
}

.hero-name   { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
.hero-mobile { font-size: 12px; color: var(--t2); font-family: var(--mono); }

.badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

.badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 7px; }
.b-blue   { background: rgba(37,99,235,0.12);  color: #60a5fa; border: 1px solid rgba(37,99,235,0.25); }
.b-green  { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
.b-amber  { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
.b-red    { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
.b-gray   { background: rgba(100,116,139,0.12);color: #94a3b8; border: 1px solid rgba(100,116,139,0.25); }
.b-purple { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.25); }

.actions { display: flex; gap: 8px; overflow-x: auto; }
.actions::-webkit-scrollbar { display: none; }

.act {
  flex-shrink: 0; padding: 9px 14px; border-radius: 10px;
  font-size: 12px; font-weight: 700; cursor: pointer; border: none;
  font-family: 'Outfit', sans-serif;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.act:active { opacity: 0.7; }

.act-call  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.act-wa    { background: rgba(37,211,102,0.15); color: #4ade80; border: 1px solid rgba(37,211,102,0.3); }
.act-real  { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
.act-disb  { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }

/* ─── TABS ─── */
.tab-bar { display: flex; background: var(--s1); border-bottom: 1px solid var(--b1); overflow-x: auto; flex-shrink: 0; }
.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0; padding: 11px 14px;
  font-size: 12px; font-weight: 600; color: var(--t3);
  cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab.active { color: var(--a3); border-bottom-color: var(--a2); }

/* ─── TAB CONTENT ─── */
.tab-body {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
}
.tab-body::-webkit-scrollbar { display: none; }

/* ─── CARDS ─── */
.card {
  background: var(--s1); border: 1px solid var(--b1);
  border-radius: 12px; overflow: hidden;
}

.card-head {
  padding: 9px 14px; font-size: 10px; font-weight: 700;
  color: var(--t3); text-transform: uppercase; letter-spacing: 0.7px;
  background: var(--s2); border-bottom: 1px solid var(--b1);
}

.irow { border-bottom: 1px solid var(--b1); }
.irow:last-child { border-bottom: none; }

.icell { padding: 10px 14px; }

.ilbl {
  font-size: 10px; color: var(--t3); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px;
}

.ival { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
.ival.mono  { font-family: var(--mono); font-size: 12px; }
.ival.green { color: var(--g2); }
.ival.amber { color: var(--am2); }
.ival.red   { color: var(--r2); }

/* ─── STATUS UPDATE ─── */
.status-form {
  background: var(--s1); border: 1px solid var(--b1);
  border-radius: 12px; padding: 14px;
}

.sel {
  width: 100%; background: var(--s2); border: 1.5px solid var(--b2);
  border-radius: 10px; padding: 11px 14px;
  color: var(--text); font-size: 13px;
  font-family: 'Outfit', sans-serif; outline: none; cursor: pointer;
  margin-bottom: 10px;
}

.textarea {
  width: 100%; background: var(--s2); border: 1.5px solid var(--b2);
  border-radius: 10px; padding: 11px 14px;
  color: var(--text); font-size: 13px;
  font-family: 'Outfit', sans-serif; outline: none;
  resize: none; height: 70px; margin-bottom: 10px;
}

.amtinput {
  width: 100%; background: var(--s2); border: 1.5px solid var(--b2);
  border-radius: 10px; padding: 11px 14px;
  color: var(--text); font-size: 13px;
  font-family: 'Outfit', sans-serif; outline: none; margin-bottom: 10px;
}

.save-btn {
  width: 100%; background: var(--accent); border: none;
  border-radius: 10px; padding: 12px;
  color: white; font-size: 14px; font-weight: 700;
  font-family: 'Outfit', sans-serif; cursor: pointer;
}
.save-btn:active  { background: var(--a2); }
.save-btn.saving  { opacity: 0.6; pointer-events: none; }
.save-btn.saved   { background: var(--green); }

/* ─── TIMELINE ─── */
.tl-item {
  display: flex; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid var(--b1); align-items: flex-start;
}
.tl-item:last-child { border-bottom: none; }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.tl-text { font-size: 12px; color: var(--t2); flex: 1; line-height: 1.5; }
.tl-text strong { color: var(--text); font-weight: 600; }
.tl-time { font-size: 10px; color: var(--t3); font-family: var(--mono); white-space: nowrap; }

/* ─── EMPTY ─── */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; padding: 40px;
}
.empty-icon { font-size: 40px; opacity: 0.3; }
.empty-text { font-size: 14px; font-weight: 600; color: var(--t2); text-align: center; }
.empty-sub  { font-size: 12px; color: var(--t3); text-align: center; }

/* ─── SPINNER ─── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--b2); border-top-color: var(--a2);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 16px;
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--s1); border: 1px solid var(--b2);
  border-radius: 12px; padding: 10px 18px;
  font-size: 13px; font-weight: 500; white-space: nowrap;
  z-index: 1000; opacity: 0; transition: all 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-width: 90vw; text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.ok  { border-color: rgba(16,185,129,0.4); color: var(--g2); }
.toast.err { border-color: rgba(239,68,68,0.4);  color: var(--r2); }

/* ─── WA POPUP ─── */
.wa-popup {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.75); z-index: 200;
  display: none; align-items: center; justify-content: center; padding: 20px;
}

.wa-card {
  background: var(--s1); border: 1px solid var(--b2);
  border-radius: 16px; padding: 20px; width: 100%; max-width: 360px;
}

.wa-title {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}

.wa-title-text { font-size: 15px; font-weight: 700; }
.wa-close { cursor: pointer; color: var(--t3); font-size: 20px; }

.wa-status {
  font-size: 11px; color: var(--a3); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
}

.wa-msg {
  background: var(--s2); border: 1px solid var(--b1);
  border-radius: 10px; padding: 12px;
  font-size: 13px; color: var(--t2); line-height: 1.6;
  white-space: pre-wrap; margin-bottom: 14px;
  max-height: 200px; overflow-y: auto;
}

.wa-btns { display: flex; gap: 8px; }

.wa-cancel {
  flex: 1; background: var(--s2); border: 1px solid var(--b2);
  border-radius: 10px; padding: 11px;
  color: var(--t2); font-size: 13px; font-weight: 600;
  font-family: 'Outfit', sans-serif; cursor: pointer;
}

.wa-send {
  flex: 2; background: #25d366; border: none;
  border-radius: 10px; padding: 11px;
  color: white; font-size: 13px; font-weight: 700;
  font-family: 'Outfit', sans-serif; cursor: pointer;
}

/* ─── DESKTOP ─── */
@media (min-width: 769px) {
  .app-body {
    flex: 1; display: flex; overflow: hidden; min-height: 0;
  }

  #listPanel {
    width: 320px; flex-shrink: 0;
    border-right: 1px solid var(--b1);
    display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
  }

  #detailScreen {
    position: static !important;
    display: flex !important;
    flex: 1; z-index: auto; min-height: 0;
  }

  .back-btn { display: none !important; }
  #desktopListWrap { display: flex; flex-direction: column; flex-shrink: 0; }
}

/* ─── MOBILE ─── */
@media (max-width: 768px) {
  .app-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  #listPanel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  #detailScreen { display: none; }

  #desktopListWrap {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .leads-list {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }

  .stats-row { flex-shrink: 0; }
  .search-wrap { flex-shrink: 0; }
  .topnav { flex-shrink: 0; }
}
</style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">💰</div>
    <div class="login-title">VastMyWealth</div>
    <div class="login-sub" id="loginSub">Sign in to access your leads</div>

    <div id="adminLoginFields">
      <div class="flabel">Your Name</div>
      <input class="finput" id="loginName" placeholder="Enter your name" />
      <div class="flabel">Role</div>
      <select class="finput" id="loginRole">
        <option value="">Select your role...</option>
        <option value="admin">Admin (Venkatesh)</option>
        <option value="inhouse">Inhouse RM (Yogesh)</option>
        <option value="vastmywealth">VastMyWealth RM (Manoj)</option>
      </select>
    </div>

    <div id="autoLoginFields" style="display:none">
      <div style="text-align:center;padding:10px 0 20px">
        <div style="font-size:36px;margin-bottom:10px" id="autoEmoji">👤</div>
        <div style="font-size:16px;font-weight:700" id="autoName">—</div>
        <div style="font-size:12px;color:var(--t2);margin-top:4px">Tap below to enter</div>
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">Enter Inbox →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ─── MAIN APP ─── -->
<div id="mainApp">

  <!-- TOP NAV -->
  <div class="topnav" id="mainNav">
    <div class="nav-logo">💰</div>
    <div style="flex:1">
      <div class="nav-title">VastMyWealth</div>
      <div class="nav-sub" id="navSub">Inbox</div>
    </div>
    <button class="sync-btn" onclick="loadData()" id="syncBtn">🔄 Sync</button>
  </div>

  <!-- APP BODY -->
  <div class="app-body">

    <!-- LIST PANEL -->
    <div id="listPanel">

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat" onclick="statFilter('all')">
          <div class="stat-num" id="stTotal" style="color:#60a5fa">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat" onclick="statFilter('pending')">
          <div class="stat-num" id="stPending" style="color:#fbbf24">0</div>
          <div class="stat-lbl">Pending</div>
        </div>
        <div class="stat" onclick="statFilter('allocated')">
          <div class="stat-num" id="stAllocated" style="color:#34d399">0</div>
          <div class="stat-lbl">Allocated</div>
        </div>
        <div class="stat" onclick="statFilter('approved')">
          <div class="stat-num" id="stApproved" style="color:#a78bfa">0</div>
          <div class="stat-lbl">Approved</div>
        </div>

<script>
// ============================================================
//  CONFIG
// ============================================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyq4EDWeGMvCG8GyV3M8lXmI0cgbFqDPPvDQjL5DoHh2k8Dly8hhP8EY1cWQfCtXGUL/exec";
var SHEET_ID        = "1z7u3RNARs9SvN4elDeEch1jdA65o2a2lDbYaIPCc1M0";
var ADMIN_PASSWORD  = "Venky@1234";

// RM config
var RM_CONFIG = {
  "Aditya Birla" : {name: "Khushboo", mobile: "8459008116"},
  "Andromeda"    : {name: "Priyanshu", mobile: "8459008116"},
  "VastMyWealth" : {name: "Manoj",    mobile: "8459008116"},
  "Inhouse"      : {name: "Yogesh",   mobile: "8459008116"}
};

// WhatsApp messages per status
var WA_MESSAGES = {
  "default"            : "Hi! I am {{RM}} your Relationship Manager from VastMyWealth!\n\nYour loan application is under review. I will contact you shortly!\n\n📱 {{MOBILE}}",
  "In Process"         : "Hi! I am {{RM}} your Relationship Manager from VastMyWealth!\n\nYour loan application is currently being processed! We will update you soon.\n\nFor any queries please contact me!\n\n📱 {{MOBILE}}",
  "Not Picking Up"     : "Hi! I am {{RM}} your Relationship Manager from VastMyWealth!\n\nI tried reaching you regarding your loan application but couldn't connect! 📵\n\nPlease call me back at your convenience!\n\n📱 {{MOBILE}}",
  "Documents Pending"  : "Hi! I am {{RM}} your Relationship Manager from VastMyWealth!\n\nYour loan application is pending due to incomplete documents! 📁\n\nPlease share your documents at the earliest to avoid any delays!\n\n📱 {{MOBILE}}",
  "Approved"           : "Hi! Great news from VastMyWealth! 🎉\n\nYour loan application has been APPROVED!\n\nPlease contact me for the next steps!\n\n📱 {{MOBILE}}",
  "Rejected"           : "Hi! I am {{RM}} from VastMyWealth!\n\nThank you for your interest. Unfortunately we are unable to process your application at this time.\n\nPlease contact me for more details!\n\n📱 {{MOBILE}}",
  "Disbursed"          : "Congratulations from VastMyWealth! 🎉\n\nYour loan amount has been disbursed successfully!\n\nThank you for choosing VastMyWealth! Please feel free to reach out for any future requirements!\n\n📱 {{MOBILE}}"
};

// ============================================================
//  STATE
// ============================================================
var currentUser  = null;
var currentRole  = null;
var allLeads     = [];
var filtered     = [];
var activeFilter = "all";
var selectedLead = null;
var isMobile     = window.innerWidth < 769;

window.addEventListener("resize", function() { isMobile = window.innerWidth < 769; });

// ============================================================
//  URL ROLE DETECTION
// ============================================================
function detectRole() {
  var params = new URLSearchParams(window.location.search);
  var role   = params.get("role");
  if (role === "inhouse")      return "inhouse";
  if (role === "vastmywealth") return "vastmywealth";
  return "admin";
}

// ============================================================
//  LOGIN INIT
// ============================================================
window.addEventListener("load", function() {
  var role = detectRole();
  if (role === "inhouse") {
    document.getElementById("adminLoginFields").style.display = "none";
    document.getElementById("autoLoginFields").style.display  = "block";
    document.getElementById("autoEmoji").textContent          = "👤";
    document.getElementById("autoName").textContent           = "Inhouse RM — Yogesh";
    document.getElementById("loginSub").textContent           = "Welcome Yogesh!";
  } else if (role === "vastmywealth") {
    document.getElementById("adminLoginFields").style.display = "none";
    document.getElementById("autoLoginFields").style.display  = "block";
    document.getElementById("autoEmoji").textContent          = "👤";
    document.getElementById("autoName").textContent           = "VastMyWealth RM — Manoj";
    document.getElementById("loginSub").textContent           = "Welcome Manoj!";
  }
});

function onRoleChange() {
  var role = document.getElementById("loginRole").value;
  document.getElementById("pwField").style.display = role === "admin" ? "block" : "none";
}

// ============================================================
//  LOGIN
// ============================================================
function doLogin() {
  var role = detectRole();
  var err  = document.getElementById("loginErr");
  err.style.display = "none";

  if (role === "inhouse") {
    currentUser = "Yogesh"; currentRole = "inhouse";
    proceedToApp(); return;
  }
  if (role === "vastmywealth") {
    currentUser = "Manoj"; currentRole = "vastmywealth";
    proceedToApp(); return;
  }

  var name    = document.getElementById("loginName").value.trim();
  var selRole = document.getElementById("loginRole").value;

  if (!name || !selRole) { toast("Please fill all fields!", "err"); return; }

  currentUser = name;
  currentRole = selRole;
  proceedToApp();
}

function proceedToApp() {
  document.getElementById("loginScreen").style.display = "none";
  var app = document.getElementById("mainApp");
  app.style.display = "flex";
  document.getElementById("navSub").textContent = currentUser + " · " + roleLabel(currentRole);

  if (!isMobile) {
    document.getElementById("detailScreen").style.display = "flex";
    document.getElementById("tabBody").innerHTML =
      '<div class="empty"><div class="empty-icon">📋</div>' +
      '<div class="empty-text">Select a lead</div>' +
      '<div class="empty-sub">Tap any lead from the list</div></div>';
  }

  loadData();
}

function roleLabel(r) {
  return r === "admin" ? "Admin" : r === "inhouse" ? "Inhouse RM" : "VastMyWealth RM";
}

// ============================================================
//  LOAD DATA
// ============================================================
function loadData() {
  var btn = document.getElementById("syncBtn");
  btn.textContent = "⏳";

  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
            "/gviz/tq?tqx=out:json&sheet=Form%20responses%201";

  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      var json = JSON.parse(txt.substring(47).slice(0,-2));
      parseData(json);
      btn.textContent = "🔄 Sync";
    })
    .catch(function() {
      btn.textContent = "🔄 Sync";
      loadDemo();
    });
}

function cv(row, idx) {
  if (!row || !row[idx] || row[idx].v == null) return "";
  return String(row[idx].v).trim();
}

function parseData(json) {
  allLeads = [];
  if (!json.table || !json.table.rows) { loadDemo(); return; }

  json.table.rows.forEach(function(r, i) {
    var c = r.c;
    var lead = {
      row             : i + 2,
      refId           : "VMW-" + String(i+2).padStart(4,"0"),
      timestamp       : cv(c,0),
      source          : cv(c,1)  || "Direct",
      fullName        : cv(c,2)  || "—",
      mobile          : cv(c,3)  || "—",
      applicantType   : cv(c,4)  || "—",
      city            : cv(c,5)  || "—",
      loanType        : cv(c,6)  || "—",
      appCibil        : cv(c,7)  || "—",
      monthlyIncome   : cv(c,8)  || "—",
      blAmount        : cv(c,9)  || "—",
      blVintage       : cv(c,10) || "—",
      plAmount        : cv(c,13) || "—",
      hlAmount        : cv(c,17) || "—",
      lapAmount       : cv(c,23) || "—",
      telegramSent    : cv(c,26) || "—",
      vendorSuggestion: cv(c,27) || "—",
      vendorAllocation: cv(c,28) || "",
      status          : cv(c,29) || "Pending",
      allocationStamp : cv(c,30) || "—",
      whatsappSent    : cv(c,31) || "—",
      vendorStatus    : cv(c,32) || "—",
      rejectionReason : cv(c,33) || "—",
      disbursedAmount : cv(c,34) || "—"
    };

    // Role based filtering
    if (currentRole === "inhouse"      && lead.vendorAllocation !== "Inhouse")      return;
    if (currentRole === "vastmywealth" && lead.vendorAllocation !== "VastMyWealth") return;

    // Hide non-active leads from Yogesh/Manoj
    if (currentRole !== "admin") {
      var vs  = String(lead.vendorStatus || "").toLowerCase().trim();
      var st  = String(lead.status       || "").toLowerCase().trim();
      var va  = String(lead.vendorAllocation || "").toLowerCase().trim();

      if (st.indexOf("duplicate")  !== -1) return;
      if (st.indexOf("dead")       !== -1) return;
      if (vs.indexOf("reject")     !== -1) return;
      if (vs.indexOf("disburse")   !== -1) return;
      if (vs.indexOf("closed")     !== -1) return;
      if (vs.indexOf("cancel")     !== -1) return;
    }

    // Hide ONLY Rejected for Admin
    if (currentRole === "admin") {
      var vs = String(lead.vendorStatus || "").toLowerCase().trim();
      if (vs.indexOf("reject") !== -1) return;
    }

    allLeads.push(lead);
  });

  // Sort latest first by row number
  allLeads.sort(function(a, b) { return b.row - a.row; });

  updateStats();
  applyFilter();
  toast("✅ " + allLeads.length + " leads loaded!", "ok");
}

// ============================================================
//  STATS
// ============================================================
function updateStats() {
  var t  = allLeads.length;
  var p  = allLeads.filter(function(l){ return !l.vendorAllocation || l.vendorAllocation === ""; }).length;
  var a  = allLeads.filter(function(l){ return l.vendorAllocation && l.vendorAllocation !== "" && l.vendorAllocation !== "Manual Decision"; }).length;
  var ap = allLeads.filter(function(l){ return l.vendorStatus && l.vendorStatus.toLowerCase().indexOf("approv") !== -1; }).length;
  var d  = allLeads.filter(function(l){ return l.status === "Duplicate"; }).length;

  document.getElementById("stTotal").textContent    = t;
  document.getElementById("stPending").textContent  = p;
  document.getElementById("stAllocated").textContent= a;
  document.getElementById("stApproved").textContent = ap;
  document.getElementById("stDead").textContent     = d;
}

// ============================================================
//  FILTER
// ============================================================
function statFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("active"); });
  var chipMap = {all:0, pending:5, dead:6};
  if (chipMap[f] !== undefined) {
    var chips = document.querySelectorAll(".chip");
    if (chips[chipMap[f]]) chips[chipMap[f]].classList.add("active");
  }
  applyFilter();
}

function setChip(f, el) {
  activeFilter = f;
  document.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("active"); });
  el.classList.add("active");
  applyFilter();
}

function applyFilter() {
  var s = (document.getElementById("searchInput")||{value:""}).value.toLowerCase();

  filtered = allLeads.filter(function(l) {
    var match = !s || l.fullName.toLowerCase().indexOf(s) !== -1 ||
                l.mobile.indexOf(s) !== -1 || l.refId.toLowerCase().indexOf(s) !== -1;
    if (!match) return false;
    var lt = l.loanType.toUpperCase();
    if (activeFilter === "pl")        return lt.indexOf("PERSONAL") !== -1;
    if (activeFilter === "bl")        return lt.indexOf("BUSINESS") !== -1;
    if (activeFilter === "hl")        return lt.indexOf("HOME") !== -1;
    if (activeFilter === "lap")       return lt.indexOf("PROPERTY") !== -1 || lt.indexOf("AGAINST") !== -1;
    if (activeFilter === "pending")   return !l.vendorAllocation || l.vendorAllocation === "";
    if (activeFilter === "allocated") return l.vendorAllocation && l.vendorAllocation !== "" && l.vendorAllocation !== "Manual Decision";
    if (activeFilter === "approved")  return l.vendorStatus && l.vendorStatus.toLowerCase().indexOf("approv") !== -1;
    if (activeFilter === "dead")      return l.status === "Duplicate";
    return true;
  });

  renderList();
}

// ============================================================
//  RENDER LIST
// ============================================================
function renderList() {
  var list = document.getElementById("leadsList");
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon" style="font-size:28px">🔍</div><div class="empty-text">No leads found</div></div>';
    return;
  }

  var COLORS = ["#2563eb","#7c3aed","#0891b2","#059669","#dc2626","#d97706"];
  var html = "";

  filtered.forEach(function(l, i) {
    var color = COLORS[l.fullName.charCodeAt(0) % COLORS.length];
    var init  = l.fullName.charAt(0).toUpperCase();
    var lt    = l.loanType.toUpperCase();

    var tagCls = "tag-pl"; var tagLbl = "PL";
    if      (lt.indexOf("PERSONAL")  !== -1)                               { tagCls = "tag-pl";  tagLbl = "PL";  }
    else if (lt.indexOf("BUSINESS")  !== -1)                               { tagCls = "tag-bl";  tagLbl = "BL";  }
    else if (lt.indexOf("HOME")      !== -1)                               { tagCls = "tag-hl";  tagLbl = "HL";  }
    else if (lt.indexOf("PROPERTY")  !== -1 || lt.indexOf("AGAINST") !== -1) { tagCls = "tag-lap"; tagLbl = "LAP"; }

    var pillCls = "pill-pending"; var pillLbl = "Pending";
    if      (l.status === "Duplicate")                              { pillCls = "pill-dup";       pillLbl = "Duplicate"; }
    else if (l.vendorAllocation && l.vendorAllocation !== "")       { pillCls = "pill-allocated"; pillLbl = l.vendorAllocation; }

    // Show vendor status if available
    if (l.vendorStatus && l.vendorStatus !== "—" && l.vendorStatus !== "") {
      pillLbl = l.vendorStatus;
      if (l.vendorStatus.toLowerCase().indexOf("approv")  !== -1) pillCls = "pill-allocated";
      if (l.vendorStatus.toLowerCase().indexOf("reject")  !== -1) pillCls = "pill-dup";
      if (l.vendorStatus.toLowerCase().indexOf("process") !== -1) pillCls = "pill-pending";
    }

    var dt = "";
    try { var d = new Date(l.timestamp); if (!isNaN(d)) dt = d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}); } catch(e){}

    var activeClass = (selectedLead && selectedLead.row === l.row) ? " active" : "";

    html += '<div class="lead-card' + activeClass + '" onclick="selectLead(' + i + ')" style="' + (activeClass ? "background:var(--s2);border-left:2px solid var(--a2);" : "") + '">' +
      '<div class="lc-ava" style="background:' + color + '">' + init + '</div>' +
      '<div class="lc-body">' +
        '<div class="lc-row1">' +
          '<div class="lc-name">' + esc(l.fullName) + '</div>' +
          '<div class="lc-time">' + dt + '</div>' +
        '</div>' +
        '<div class="lc-mob">📱 ' + l.mobile + '</div>' +
        '<div class="lc-tags">' +
          '<span class="tag ' + tagCls + '">' + tagLbl + '</span>' +
          '<span class="pill ' + pillCls + '">' + esc(pillLbl) + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  });

  list.innerHTML = html;
}

// ============================================================
//  SELECT LEAD
// ============================================================
function selectLead(idx) {
  selectedLead = filtered[idx];
  if (!selectedLead) return;

  // Highlight in list
  renderList();

  // Fill detail
  fillDetail(selectedLead);

  // Mobile — show detail screen
  if (isMobile) {
    document.getElementById("listPanel").style.display    = "none";
    document.getElementById("detailScreen").style.display = "flex";
  }
}

// ============================================================
//  FILL DETAIL
// ============================================================
function fillDetail(l) {
  var color = getColor(l.fullName);

  document.getElementById("dAva").textContent          = l.fullName.charAt(0).toUpperCase();
  document.getElementById("dAva").style.background     = color;
  document.getElementById("dName").textContent         = l.fullName;
  document.getElementById("dnName").textContent        = l.fullName;
  document.getElementById("dMobile").textContent       = "📱 " + l.mobile;
  document.getElementById("dnRef").textContent         = l.refId;
  document.getElementById("dBadges").innerHTML         = buildBadges(l);
  document.getElementById("dActions").innerHTML        = buildActions(l);

  // Show details tab by default
  var firstTab = document.querySelector(".tab-bar .tab");
  document.querySelectorAll(".tab-bar .tab").forEach(function(t){ t.classList.remove("active"); });
  if (firstTab) firstTab.classList.add("active");
  document.getElementById("tabBody").innerHTML = buildTab("details", l);
}

// ============================================================
//  BUILD BADGES
// ============================================================
function buildBadges(l) {
  var lt = l.loanType.toUpperCase();
  var tag = "PL";
  if      (lt.indexOf("PERSONAL")  !== -1)                               tag = "PL";
  else if (lt.indexOf("BUSINESS")  !== -1)                               tag = "BL";
  else if (lt.indexOf("HOME")      !== -1)                               tag = "HL";
  else if (lt.indexOf("PROPERTY")  !== -1 || lt.indexOf("AGAINST") !== -1) tag = "LAP";

  // Loan amount
  var amt = "";
  if      (lt.indexOf("PERSONAL")  !== -1) amt = l.plAmount;
  else if (lt.indexOf("BUSINESS")  !== -1) amt = l.blAmount;
  else if (lt.indexOf("HOME")      !== -1) amt = l.hlAmount;
  else if (lt.indexOf("PROPERTY")  !== -1 || lt.indexOf("AGAINST") !== -1) amt = l.lapAmount;

  var statusBadge = '<div class="badge b-amber">⏳ Pending</div>';
  if      (l.status === "Duplicate")                              statusBadge = '<div class="badge b-red">🔁 Duplicate</div>';
  else if (l.vendorAllocation && l.vendorAllocation !== "") {
    var vs = l.vendorStatus && l.vendorStatus !== "—" ? l.vendorStatus : l.vendorAllocation;
    var bc = "b-green";
    if (vs.toLowerCase().indexOf("reject")  !== -1) bc = "b-red";
    if (vs.toLowerCase().indexOf("pending") !== -1) bc = "b-amber";
    if (vs.toLowerCase().indexOf("process") !== -1) bc = "b-amber";
    statusBadge = '<div class="badge ' + bc + '">✅ ' + esc(vs) + '</div>';
  }

  return '<div class="badge b-blue">📍 ' + esc(l.city) + '</div>' +
         '<div class="badge b-gray">👤 ' + esc(l.applicantType) + '</div>' +
         '<div class="badge b-purple">💼 ' + tag + (amt && amt !== "—" ? " · " + amt : "") + '</div>' +
         '<div class="badge b-blue">📊 ' + esc(l.appCibil) + '</div>' +
         statusBadge;
}

// ============================================================
//  BUILD ACTIONS
// ============================================================
function buildActions(l) {
  var isAllocated = l.vendorAllocation && l.vendorAllocation !== "" && l.vendorAllocation !== "Manual Decision";

  // Call button — always visible
  var html = '<a class="act act-call" href="tel:' + l.mobile + '">📞 Call ' + l.fullName.split(" ")[0] + '</a>';

  // WhatsApp button — after allocation
  if (isAllocated) {
    html += '<button class="act act-wa" onclick="showWAPopup()">💬 WhatsApp</button>';
  }

  return html;
}

// ============================================================
//  BUILD TAB CONTENT
// ============================================================
function buildTab(tab, l) {
  if (!l) return '<div class="empty"><div class="empty-text">No lead selected</div></div>';
  var lt = l.loanType.toUpperCase();

  // ── DETAILS ──
  if (tab === "details") {
    var isAllocated = l.vendorAllocation && l.vendorAllocation !== "" && l.vendorAllocation !== "Manual Decision";

    return card("Loan Details",
      irow(icell("Monthly Income", l.monthlyIncome)) +
      irow(icell("Source", l.source)) +
      irow(icell("Submitted", fmtDate(l.timestamp)))
    ) +
    card("Allocation",
      irow(icell("Allocated To", isAllocated ? l.vendorAllocation : "⏳ Pending")) +
      irow(icell("Allocation Time", l.allocationStamp || "—")) +
      irow(icell("Vendor Status", l.vendorStatus || "—"))
    );
  }

  // ── ALLOCATION ──
  if (tab === "allocation") {
    return card("Allocation Details",
      irow(icell("Suggested Vendor", l.vendorSuggestion)) +
      irow(icell("Allocated To", l.vendorAllocation || "Pending")) +
      irow(icell("Allocation Time", l.allocationStamp)) +
      irow(icell("Vendor Status", l.vendorStatus || "—")) +
      irow(icell("Rejection Reason", l.rejectionReason || "—")) +
      irow(icell("Disbursed Amount", l.disbursedAmount || "—"))
    );
  }

  // ── STATUS UPDATE ──
  if (tab === "status") {
    var isAllocated = l.vendorAllocation && l.vendorAllocation !== "" && l.vendorAllocation !== "Manual Decision";
    if (!isAllocated) {
      return '<div class="empty"><div class="empty-icon" style="font-size:28px">⏳</div>' +
             '<div class="empty-text">Vendor not allocated yet</div>' +
             '<div class="empty-sub">Allocate via Telegram first!</div></div>';
    }

    return '<div class="status-form">' +
      '<div class="card-head" style="margin:-14px -14px 12px;border-radius:12px 12px 0 0;padding:9px 14px">Update Status</div>' +
      '<select class="sel" id="statusSel" onchange="onStatusChange()">' +
        '<option value="">Select status...</option>' +
        '<option>In Process</option>' +
        '<option>Not Picking Up</option>' +
        '<option>Documents Pending</option>' +
        '<option>Approved</option>' +
        '<option>Rejected</option>' +
        '<option>Disbursed</option>' +
      '</select>' +
      '<div id="reasonWrap" style="display:none">' +
        '<textarea class="textarea" id="reasonInput" placeholder="Enter rejection reason..."></textarea>' +
      '</div>' +
      '<div id="disburseWrap" style="display:none">' +
        '<input class="amtinput" id="disburseInput" type="number" placeholder="Enter disbursed amount (e.g. 500000)" />' +
      '</div>' +
      '<button class="save-btn" id="saveBtn" onclick="saveStatus()">💾 Save Status</button>' +
    '</div>' +
    card("Current Status",
      irow(icell("Vendor Status", l.vendorStatus || "—")) +
      irow(icell("Reason", l.rejectionReason || "—")) +
      irow(icell("Disbursed", l.disbursedAmount || "—"))
    );
  }

  // ── TIMELINE ──
  if (tab === "timeline") {
    var items = [];
    if (l.timestamp)                                    items.push({c:"#3b82f6", t:"<strong>Form Submitted</strong> via " + l.source, d: fmtDate(l.timestamp)});
    if (l.telegramSent === "Yes")                       items.push({c:"#8b5cf6", t:"<strong>Telegram Notified</strong> — Admin", d:"—"});
    if (l.vendorAllocation && l.vendorAllocation !== "") items.push({c:"#10b981", t:"<strong>Allocated</strong> to " + l.vendorAllocation, d: l.allocationStamp});
    if (l.vendorStatus && l.vendorStatus !== "—")       items.push({c:"#f59e0b", t:"<strong>Status:</strong> " + l.vendorStatus, d:"—"});
    if (l.disbursedAmount && l.disbursedAmount !== "—") items.push({c:"#10b981", t:"<strong>Disbursed:</strong> ₹" + l.disbursedAmount, d:"—"});
    if (l.status === "Duplicate")                       items.push({c:"#ef4444", t:"<strong>Duplicate</strong> — skipped", d:"—"});

    if (!items.length) return card("Timeline", '<div style="padding:20px;text-align:center;color:var(--t3);font-size:13px">No activity yet</div>');

    return card("Activity Timeline",
      items.map(function(it) {
        return '<div class="tl-item">' +
          '<div class="tl-dot" style="background:' + it.c + '"></div>' +
          '<div class="tl-text">' + it.t + '</div>' +
          '<div class="tl-time">' + it.d + '</div>' +
        '</div>';
      }).join("")
    );
  }

  return "";
}

function showTab(tab, el) {
  document.querySelectorAll(".tab-bar .tab").forEach(function(t){ t.classList.remove("active"); });
  if (el) el.classList.add("active");
  if (selectedLead) document.getElementById("tabBody").innerHTML = buildTab(tab, selectedLead);

// ============================================================
//  STATUS CHANGE
// ============================================================
function onStatusChange() {
  var v = (document.getElementById("statusSel")||{}).value;
  var rw = document.getElementById("reasonWrap");
  var dw = document.getElementById("disburseWrap");
  if (rw) rw.style.display = v === "Rejected"  ? "block" : "none";
  if (dw) dw.style.display = v === "Disbursed" ? "block" : "none";
}

// ============================================================
//  SAVE STATUS
// ============================================================
function saveStatus() {
  var sel      = document.getElementById("statusSel");
  var reason   = document.getElementById("reasonInput");
  var disbursed= document.getElementById("disburseInput");
  var btn      = document.getElementById("saveBtn");

  if (!sel || !sel.value) { toast("Please select a status!", "err"); return; }
  if (!selectedLead) return;

  btn.classList.add("saving");
  btn.textContent = "Saving...";

  var url = APPS_SCRIPT_URL +
    "?action=updateStatus" +
    "&row="      + selectedLead.row +
    "&status="   + encodeURIComponent(sel.value) +
    "&reason="   + encodeURIComponent(reason   ? reason.value    : "") +
    "&disbursed="+ encodeURIComponent(disbursed ? disbursed.value : "") +
    "&vendor="   + encodeURIComponent(selectedLead.vendorAllocation || "");

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function() {
      btn.classList.remove("saving");
      btn.classList.add("saved");
      btn.textContent = "✅ Saved!";
      toast("✅ Status: " + sel.value, "ok");

      // Update selected lead locally
      selectedLead.vendorStatus = sel.value;
      if (reason && reason.value)    selectedLead.rejectionReason = reason.value;
      if (disbursed && disbursed.value) selectedLead.disbursedAmount = disbursed.value;

      // Refresh badges and list
      document.getElementById("dBadges").innerHTML  = buildBadges(selectedLead);
      document.getElementById("dActions").innerHTML = buildActions(selectedLead);
      renderList();

      setTimeout(function() {
        btn.classList.remove("saved");
        btn.textContent = "💾 Save Status";
      }, 2000);
    })
    .catch(function() {
      btn.classList.remove("saving");
      btn.textContent = "💾 Save Status";
      toast("⚠️ Saved locally! Sync when connected.", "err");
    });
}

// ============================================================
//  HELPERS
// ============================================================
function card(title, content) {
  return '<div class="card"><div class="card-head">' + title + '</div>' + content + '</div>';
}

function irow(content) { return '<div class="irow">' + content + '</div>'; }

function icell(label, val, cls) {
  return '<div class="icell"><div class="ilbl">' + label + '</div>' +
    '<div class="ival' + (cls ? " " + cls : "") + '">' + esc(val || "—") + '</div></div>';
}

function getColor(name) {
  var c = ["#2563eb","#7c3aed","#0891b2","#059669","#dc2626","#d97706"];
  return c[name.charCodeAt(0) % c.length];
}

function fmtDate(ts) {
  if (!ts) return "—";
  try {
    var d = new Date(ts);
    if (isNaN(d)) return ts;
    return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}) +
           " " + d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
  } catch(e) { return ts; }
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + (type || "");
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 3000);
}
